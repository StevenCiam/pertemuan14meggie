<!DOCTYPE html>
<html lang="id">
<head>
    <title>Halaman Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
        }
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px; 
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h2 { color: #333; font-size: 28px; font-weight: 600; }
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; margin-bottom: 8px; color: #666; font-size: 14px; font-weight: bold;
        }
        .input-group input {
            width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc;
            border-radius: 6px; outline: none; transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: #B063D8; }
        .btn-login {
            width: 100%; padding: 14px; background-color: #B063D8; 
            color: white; border: none; border-radius: 6px; font-size: 16px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: background-color 0.2s; margin-top: 10px;
        }
        .btn-login:hover { background-color: #954ebc; }
        
        .login-footer { margin-top: 25px; text-align: center; font-size: 14px; color: #888; }
        .login-footer a { color: #2F93FF; text-decoration: none; font-weight: bold;}
        .login-footer a:hover { text-decoration: underline; }

        /* Tambahan CSS untuk Tombol Materi */
        .materi-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
        }
        .materi-section p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .btn-materi {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background-color: #2F93FF;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-materi:hover { background-color: #1a7ae5; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>SIGN IN</h2>
        </div>
        
        <form id="formLogin">
            <div class="input-group">
                <label for="username">Username / Email</label>
                <input type="text" id="username" placeholder="Masukkan username Anda" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Masukkan password Anda" required>
            </div>
            
            <button type="submit" class="btn-login">Masuk</button>
        </form>

        <div class="login-footer">
            <p>Belum punya akun? <a href="daftar.html">Daftar di sini</a></p>
        </div>

        <!-- Tambahan Bagian Materi Akses Langsung -->
        <div class="materi-section">
            <p>Akses Materi Pembelajaran (Tanpa Login):</p>
            <!-- Sesuaikan "folder/namafile.html" dengan nama folder dan file Anda yang sebenarnya -->
            <a href="Materi/flexbox.html" class="btn-materi">Materi 1: CSS Flex Box</a>
            <a href="Materi/float.html" class="btn-materi">Materi 2: CSS Float</a>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(event) {
            // Mencegah halaman refresh otomatis
            event.preventDefault(); 
            
            // Mengambil teks yang diketik di kolom
            let user = document.getElementById('username').value;
            let pass = document.getElementById('password').value;
            
            // Cek kondisi: Jika username "admin" dan password "1234"
            if(user === "admin" && pass === "1234") {
                alert("Selamat datang, Admin! Login berhasil.");
                window.location.href = "folder/indexweb.html"; 
            } else {
                // Jika salah, munculkan peringatan
                alert("Maaf, Username atau Password salah! Silakan coba lagi."); 
            }
        });
    </script>

</body>
</html>
