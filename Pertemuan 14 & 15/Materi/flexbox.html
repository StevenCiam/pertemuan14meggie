<!DOCTYPE html>
<html>
    <head>
        <title>Flex Box</title>
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                font-size: 20px;
                font-family: arial;
                color: white;
                text-transform: uppercase;
                text-align: center;
            }

            .container {
                width: 600px;
                margin: 50px auto; /* Memperbaiki 50 menjadi 50px */
                border: 5px solid #333;
                box-sizing: border-box;
                padding: 5px;
            }

            header {
                background-color: #B063D8;
                padding: 40px 0;
            }

            /* Ini adalah pembungkus flexbox-nya */
            .content {
                display: flex;
            }

            .sidebar {  
                flex: 1; /* Mengambil rasio 1 bagian */
            }

            .sidebar aside {
                background-color: #2F93FF;
                padding: 40px 0;
            }
            
            .sidebar nav {
                background-color: #E45765;
                padding: 100px 0;
            }

            main {
                background-color: #E0AA77;
                box-sizing: border-box;
                flex: 1.5; /* Mengambil rasio 1.5 bagian */
                padding-top: 40px; /* Tambahan sedikit padding atas agar teks 'MAIN' turun sedikit */
            }

            footer {
                background-color: #666;
                padding: 20px 0;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <header>Header</header>
            
            <div class="content">
                <div class="sidebar">
                   <aside>ASide</aside> 
                   <nav>Nav</nav>
                </div>
                <main>Main</main>
            </div>
            <footer>Footer</footer>
        </div>
    </body>
</html>
